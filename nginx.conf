server {
    listen 80;
    listen [::]:80;
    server_name tristonarmstrong.com www.tristonarmstrong.com triston.dev www.triston.dev;

    root /var/www/Personal-Site/dist/client;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # RSS Feed - explicit location for proper content-type
    location = /feed.xml {
        add_header Content-Type "application/rss+xml; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # Sitemap - explicit location for proper content-type
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # Robots.txt
    location = /robots.txt {
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # Main location block for SPA
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Static assets - cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
